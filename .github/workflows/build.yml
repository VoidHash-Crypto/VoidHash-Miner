name: Build VoidHash Miner

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: voidhash-miner-linux-amd64
          - goos: windows
            goarch: amd64
            output: voidhash-miner-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go mod download
          go build -ldflags="-s -w" -o ${{ matrix.output }} ./cmd/miner/
          ls -lh ${{ matrix.output }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}

  release:
    name: Upload to Release
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Linux
        uses: actions/download-artifact@v4
        with:
          name: voidhash-miner-linux-amd64

      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: voidhash-miner-windows-amd64.exe

      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            voidhash-miner-linux-amd64
            voidhash-miner-windows-amd64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
